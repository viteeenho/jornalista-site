backend:
  name: git-gateway
  branch: main

media_folder: "imagens"
public_folder: "/imagens"
format: "json"

collections:
  - name: "configuracoes"
    label: "Configurações do site"
    delete: false
    files:
      - file: "conteudo/configuracoes.json"
        label: "Visual e editorias"
        name: "geral"
        fields:
          - { label: "Cor de fundo do site", name: "cor_tema", widget: "color", default: "#022c22" }
          - { label: "Cor dos detalhes e links", name: "cor_destaque", widget: "color", default: "#34d399" }
          - name: "editorias"
            label: "Editorias do site"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Nome da editoria", name: "nome", widget: "string" }
              - { label: "Layout de exibição", name: "layout", widget: "select", options: ["Grade de cards", "Carrossel horizontal", "Blocos de texto"] }

  - name: "publicidade"
    label: "Publicidade e banners"
    delete: false
    files:
      - file: "conteudo/publicidade.json"
        label: "Gerenciar anúncios"
        name: "anuncios"
        fields:
          - name: "lista"
            label: "Lista de banners"
            widget: "list"
            fields:
              - { label: "Nome do anunciante", name: "title", widget: "string" }
              - { label: "Imagem do banner", name: "image", widget: "image" }
              - { label: "Link do anunciante", name: "link", widget: "string" }
              - { label: "Posição do anúncio", name: "posicao", widget: "select", options: ["topo", "meio"] }
              - { label: "Ativar anúncio", name: "ativo", widget: "boolean", default: true }

  - name: "noticias"
    label: "Notícias e reportagens"
    delete: false
    files:
      - file: "conteudo/noticias.json"
        label: "Todas as matérias"
        name: "materias"
        fields:
          - name: "lista"
            label: "Lista de reportagens"
            widget: "list"
            fields:
              - { label: "Título da matéria", name: "title", widget: "string" }
              - { label: "Editoria", name: "editoria", widget: "relation", collection: "configuracoes", file: "geral", search_fields: ["editorias.*.nome"], value_field: "editorias.*.nome", display_fields: ["editorias.*.nome"] }
              - { label: "Veículo de publicação", name: "veiculo", widget: "string" }
              - { label: "Imagem de capa", name: "image", widget: "image" }
              - { label: "Linha fina / Resumo", name: "resumo", widget: "text" }
              - { label: "Link de destino", name: "link_externo", widget: "string" }

  - name: "perfil"
    label: "Quem sou (Biografia)"
    delete: false
    files:
      - file: "conteudo/biografia.json"
        label: "Dados do perfil"
        name: "dados_perfil"
        fields:
          - { label: "Nome profissional", name: "name", widget: "string" }
          - { label: "MTB", name: "mtb", widget: "string" }
          - { label: "Slogan pessoal", name: "slogan", widget: "string" }
          - { label: "Texto da biografia", name: "texto_bio", widget: "text" }
          - { label: "Foto de perfil", name: "foto", widget: "image" }
          - { label: "Link do WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Link do LinkedIn", name: "linkedin", widget: "string" }
          - { label: "Link do Instagram", name: "instagram", widget: "string" }
          - { label: "Link de E-mail", name: "email", widget: "string" }