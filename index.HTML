<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Jornalismo | Portfólio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght=0,300;0,400;0,700;0,900;1,300&family=Inter:wght=300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #022c22; transition: background-color 0.3s ease; }
        .serif-font { font-family: 'Merriweather', serif; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .placeholder-img { background: repeating-linear-gradient(45deg, #064e3b, #064e3b 10px, #022c22 10px, #022c22 20px); }
    </style>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="text-slate-300 antialiased bg-emerald-950">

    <nav class="sticky top-0 z-50 bg-emerald-950/95 backdrop-blur-md border-b border-emerald-900 shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div id="nav-nome" class="font-bold text-white tracking-widest uppercase text-xl">
                Portal de Notícias
            </div>
            <ul id="menu-editorias" class="flex gap-6 text-sm font-bold tracking-wide text-emerald-400/80 uppercase">
                </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12 space-y-20">

        <div id="banner-topo" class="w-full h-24 border-2 border-dashed border-emerald-700/50 flex items-center justify-center bg-emerald-900/20 rounded-lg text-emerald-600/70 text-sm font-bold uppercase tracking-widest">
            [Espaço para Publicidade - Topo]
        </div>

        <div id="secoes-editoriais" class="space-y-20">
            </div>

        <div id="banner-meio" class="w-full h-24 border-2 border-dashed border-emerald-700/50 flex items-center justify-center bg-emerald-900/20 rounded-lg text-emerald-600/70 text-sm font-bold uppercase tracking-widest">
            [Espaço para Publicidade - Meio da página]
        </div>

    </main>

    <footer id="bio" class="bg-emerald-950 border-t border-emerald-900 mt-20 pt-20 pb-12 relative overflow-hidden">
        
        <div class="absolute top-0 left-1/2 -ml-32 -mt-10 w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>

        <div class="max-w-4xl mx-auto relative z-10 text-center px-6">
            
            <div class="mb-8 relative inline-block">
                <div class="absolute -inset-1 bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-full blur opacity-60"></div>
                <div class="relative w-40 h-40 rounded-full border-4 border-emerald-900 shadow-2xl mx-auto bg-emerald-900 overflow-hidden flex items-center justify-center">
                    <img id="bio-foto" src="" alt="Foto de perfil" class="w-full h-full object-cover hidden">
                    <span id="bio-foto-placeholder" class="text-emerald-500 font-bold text-sm uppercase p-4">[Foto]</span>
                </div>
            </div>
            
            <h1 id="bio-nome" class="text-4xl md:text-5xl font-black mb-2 leading-tight text-white">[Nome da Jornalista]</h1>
            <p id="bio-mtb" class="text-sm text-emerald-400/80 font-mono mb-6">MTB [000000/UF]</p>

            <h2 id="bio-slogan" class="text-2xl font-light text-emerald-100 serif-font italic mb-6">
                [Slogan pessoal]
            </h2>

            <p id="bio-texto" class="text-lg text-emerald-200/80 leading-relaxed max-w-2xl mx-auto mb-10 font-light">
                [Biografia profissional]
            </p>

            <div class="flex justify-center gap-4 flex-wrap mb-16">
                <a id="link-whatsapp" href="#" target="_blank" class="bg-green-700 text-white px-8 py-3 rounded-full font-semibold flex items-center gap-2 shadow-lg hidden">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a id="link-linkedin" href="#" target="_blank" class="bg-blue-700 text-white px-8 py-3 rounded-full font-semibold flex items-center gap-2 shadow-lg hidden">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a id="link-instagram" href="#" target="_blank" class="bg-emerald-900 text-white px-8 py-3 rounded-full font-semibold flex items-center gap-2 border border-emerald-700 hidden">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a id="link-email" href="#" class="bg-slate-200 text-emerald-950 px-8 py-3 rounded-full font-bold flex items-center gap-2 shadow-lg hidden">
                    <i class="fas fa-envelope"></i> E-mail
                </a>
            </div>

            <div class="border-t border-emerald-900 pt-8 text-emerald-500/60 text-xs">
                &copy; <span id="ano-atual"></span> <span id="footer-nome">[Nome da Jornalista]</span>. Todos os direitos reservados.
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('ano-atual').innerText = new Date().getFullYear();

            let estiloCustomizado = document.createElement('style');
            document.head.appendChild(estiloCustomizado);

            // FUNÇÃO AUXILIAR PARA CRIAR ID DE LINKS (SLUG)
            function criarSlug(texto) {
                return texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').replace(/[^a-z0-8\-]/g, '');
            }

            // 1. CARREGAR CONFIGURAÇÕES VISUAIS E EDITORIAS
            Promise.all([
                fetch('conteudo/configuracoes.json').then(res => res.json()).catch(() => null),
                fetch('conteudo/noticias.json').then(res => res.json()).catch(() => null)
            ]).then(([config, noticias]) => {
                
                if (config) {
                    // Injeção dinâmica de paleta de cores enviada pelo painel
                    const tema = config.cor_tema || '#022c22';
                    const destaque = config.cor_destaque || '#34d399';
                    
                    estiloCustomizado.innerHTML = `
                        body, nav, footer, .bg-emerald-950 { background-color: ${tema} !important; }
                        .text-emerald-400, .text-teal-500, .text-emerald-400\/80 { color: ${destaque} !important; }
                        .border-emerald-900, .border-emerald-800\/50, .border-emerald-700\/50 { border-color: ${destaque}30 !important; }
                        .bg-emerald-900\/20, .bg-emerald-900\/30, .bg-emerald-900\/40 { background-color: ${tema}66 !important; border-color: ${destaque}20 !important; }
                        .placeholder-img { background: repeating-linear-gradient(45deg, ${destaque}20, ${destaque}20 10px, ${tema} 10px, ${tema} 20px) !important; }
                    `;

                    // CONSTRUÇÃO DO MENU E DAS SEÇÕES EDITORIAIS
                    const menu = document.getElementById('menu-editorias');
                    const secoesContainer = document.getElementById('secoes-editorials');
                    
                    menu.innerHTML = '';
                    secoesContainer.innerHTML = '';

                    const listaEditorias = config.editorias || [];
                    const listaMaterias = noticias && noticias.lista ? noticias.lista : [];

                    listaEditorias.forEach(editoria => {
                        const slug = criarSlug(editoria.nome);
                        
                        // Adiciona o item no menu de navegação superior
                        menu.innerHTML += `<li><a href="#${slug}" class="hover:text-white transition">${editoria.nome}</a></li>`;

                        // Filtra as notícias pertencentes a esta editoria específica
                        const materiasFiltradas = listaMaterias.filter(m => m.editoria === editoria.nome);
                        let conteudoHTML = '';

                        if (materiasFiltradas.length === 0) {
                            conteudoHTML = `<p class="text-slate-500 text-sm">Aguardando publicações nesta categoria.</p>`;
                        } else {
                            // Renderização baseada no tipo de layout escolhido no CMS
                            if (editoria.layout === 'Grade de cards') {
                                conteudoHTML = `<div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">`;
                                materiasFiltradas.forEach(m => {
                                    conteudoHTML += `
                                        <a href="${m.link_externo}" target="_blank" class="bg-emerald-900/40 rounded-xl border border-emerald-800/50 overflow-hidden transition duration-300 card-hover flex flex-col h-full group">
                                            <div class="h-40 overflow-hidden relative bg-black">
                                                <img src="${m.image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                                            </div>
                                            <div class="p-5 flex-1 flex flex-col">
                                                <span class="text-emerald-400 text-[10px] font-bold uppercase mb-1">${m.veiculo}</span>
                                                <h3 class="text-lg font-bold mb-2 leading-snug serif-font text-white">${m.title}</h3>
                                                <p class="text-emerald-200/70 text-xs leading-relaxed mb-3 flex-1">${m.resumo}</p>
                                                <div class="pt-3 border-t border-emerald-800/50 mt-auto">
                                                    <span class="text-emerald-400 font-semibold text-xs flex items-center gap-2">Ler matéria <i class="fas fa-external-link-alt text-[10px]"></i></span>
                                                </div>
                                            </div>
                                        </a>`;
                                });
                                conteudoHTML += `</div>`;
                            } 
                            
                            else if (editoria.layout === 'Carrossel horizontal') {
                                conteudoHTML = `<div class="flex overflow-x-auto gap-6 pb-8 snap-x snap-mandatory scroll-smooth">`;
                                materiasFiltradas.forEach(m => {
                                    conteudoHTML += `
                                        <a href="${m.link_externo}" target="_blank" class="snap-center shrink-0 w-80 bg-emerald-900/30 rounded-xl border border-emerald-800/50 overflow-hidden flex flex-col">
                                            <div class="h-40 relative bg-black">
                                                <img src="${m.image}" class="w-full h-full object-cover">
                                            </div>
                                            <div class="p-5 flex-1 flex flex-col">
                                                <span class="text-teal-500 text-[10px] font-bold uppercase mb-1">${m.veiculo}</span>
                                                <h5 class="font-bold text-lg text-white mb-2 leading-tight">${m.title}</h5>
                                                <p class="text-xs text-emerald-200/60 mb-4 flex-1">${m.resumo}</p>
                                            </div>
                                        </a>`;
                                });
                                conteudoHTML += `<div class="shrink-0 w-6"></div></div>`;
                            } 
                            
                            else if (editoria.layout === 'Blocos de texto') {
                                conteudoHTML = `<div class="grid md:grid-cols-3 gap-6">`;
                                materiasFiltradas.forEach(m => {
                                    conteudoHTML += `
                                        <a href="${m.link_externo}" target="_blank" class="bg-emerald-900/20 border border-emerald-800/50 p-6 rounded-xl flex flex-col h-full">
                                            <div class="mb-4">
                                                <span class="text-xs font-bold text-emerald-400 uppercase tracking-widest border border-emerald-800 px-2 py-1 rounded-md">${m.veiculo}</span>
                                            </div>
                                            <h3 class="text-xl font-serif text-white font-bold mb-3">${m.title}</h3>
                                            <p class="text-sm text-emerald-200/60 leading-relaxed mb-6 flex-1">${m.resumo}</p>
                                            <div class="flex items-center text-white font-bold text-sm">
                                                Ler artigo completo <i class="fas fa-arrow-right ml-2 text-[10px]"></i>
                                            </div>
                                        </a>`;
                                });
                                conteudoHTML += `</div>`;
                            }
                        }

                        // ICONES VARIADOS DE ACORDO COM O LAYOUT SÓ PARA DECORAÇÃO EDITORIAL
                        let icone = 'fa-newspaper';
                        if(editoria.layout === 'Carrossel horizontal') icone = 'fa-microscope';
                        if(editoria.layout === 'Blocos de texto') icone = 'fa-pen-nib';

                        // Injeta a seção completa montada no HTML
                        secoesContainer.innerHTML += `
                            <section id="${slug}" class="pt-4">
                                <div class="flex items-center gap-4 mb-8">
                                    <div class="p-3 bg-emerald-900/30 text-emerald-400 rounded-full border border-emerald-800/50">
                                        <i class="fas ${icone} text-xl"></i>
                                    </div>
                                    <h2 class="text-3xl font-bold text-white">${editoria.nome}</h2>
                                </div>
                                ${conteudoHTML}
                            </section>
                        `;
                    });

                    // Inclui o link fixo da Biografia ao final do menu gerado
                    menu.innerHTML += `<li><a href="#bio" class="hover:text-white transition">Quem Sou</a></li>`;
                }
            });

            // 2. CARREGAR BIOGRAFIA E PERFIL
            fetch('conteudo/biografia.json')
                .then(res => res.json())
                .then(data => {
                    if(data) {
                        if(data.name) {
                            document.getElementById('bio-nome').innerText = data.name;
                            document.getElementById('footer-nome').innerText = data.name;
                        }
                        if(data.mtb) document.getElementById('bio-mtb').innerText = `MTB ${data.mtb}`;
                        if(data.slogan) document.getElementById('bio-slogan').innerText = `"${data.slogan}"`;
                        if(data.texto_bio) document.getElementById('bio-texto').innerText = data.texto_bio;
                        
                        if(data.foto) {
                            const fotoImg = document.getElementById('bio-foto');
                            fotoImg.src = data.foto;
                            fotoImg.classList.remove('hidden');
                            document.getElementById('bio-foto-placeholder').classList.add('hidden');
                        }

                        if(data.whatsapp) {
                            const el = document.getElementById('link-whatsapp');
                            el.href = data.whatsapp;
                            el.classList.remove('hidden');
                        }
                        if(data.linkedin) {
                            const el = document.getElementById('link-linkedin');
                            el.href = data.linkedin;
                            el.classList.remove('hidden');
                        }
                        if(data.instagram) {
                            const el = document.getElementById('link-instagram');
                            el.href = data.instagram;
                            el.classList.remove('hidden');
                        }
                        if(data.email) {
                            const el = document.getElementById('link-email');
                            el.href = `mailto:${data.email}`;
                            el.classList.remove('hidden');
                        }
                    }
                }).catch(err => console.log("Dados do perfil aguardando preenchimento."));

            // 3. CARREGAR ANÚNCIOS (CONDICIONAIS)
            fetch('conteudo/publicidade.json')
                .then(res => res.json())
                .then(data => {
                    const anuncios = data.lista || [];
                    anuncios.forEach(anuncio => {
                        if(anuncio.ativo) {
                            const container = document.getElementById(`banner-${anuncio.posicao}`);
                            if(container) {
                                container.innerHTML = `<a href="${anuncio.link}" target="_blank" class="w-full h-full block">
                                    <img src="${anuncio.image}" alt="${anuncio.title}" class="w-full h-full object-cover rounded-lg">
                                </a>`;
                                container.classList.remove('border-dashed', 'border-2', 'text-emerald-600/70', 'text-sm', 'font-bold', 'uppercase', 'tracking-widest');
                                container.classList.add('h-32'); 
                            }
                        }
                    });
                }).catch(err => console.log("Anúncios não configurados."));
        });
    </script>
</body>
</html>
